name: Publish Project

on:
  workflow_run:
    workflows: ["Build Project"]
    types:
      - completed

permissions:
  contents: write # Grants permission to create GitHub releases

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: game-builds
          path: builds/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use run_id for a unique, guaranteed-to-work tag
          tag_name: run-${{ github.event.workflow_run.id }}
          name: Build ${{ github.event.workflow_run.id }}
          files: |
            builds/html.zip
            builds/windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Itch.io
        uses: Ayowel/butler-to-itch@v2
        with:
          butler_key: ${{ secrets.BUTLER_CREDENTIALS }}
          itch_user: your-username
          itch_game: your-game-name
          # Sync versioning exactly with the GitHub release
          version: run-${{ github.event.workflow_run.id }}
          files: |
            builds/html.zip:html5
            builds/windows.zip:windows
