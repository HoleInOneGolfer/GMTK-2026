name: Build Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          include-templates: true
          use-dotnet: false

      - name: Export
        run: |
          mkdir -p builds/html builds/windows
          # Ensure these preset names match your export_presets.cfg exactly!
          godot --headless --export-release "Web" builds/html/index.html
          godot --headless --export-release "Windows Desktop" builds/windows/game.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-builds
          path: builds/
