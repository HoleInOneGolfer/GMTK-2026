name: Build and Publish

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          include-templates: true
          use-dotnet: false

      - name: Export
        run: |
          mkdir -p builds/html builds/windows
          # Ensure your export preset names match these exactly
          godot --headless --export-release "Web" builds/html/index.html
          godot --headless --export-release "Windows" builds/windows/game.exe

          # Zip the files
          cd builds/html && zip -r ../html.zip . && cd ../..
          cd builds/windows && zip -r ../windows.zip . && cd ../..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-builds
          path: builds/*.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential to fix your previous 403 error
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: game-builds
          path: builds/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: run-${{ github.run_id }}
          name: Build ${{ github.run_id }}
          files: |
            builds/html.zip
            builds/windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Itch.io
        uses: Ayowel/butler-to-itch@v2
        with:
          butler_key: ${{ secrets.BUTLER_CREDENTIALS }}
          itch_user: your-username
          itch_game: your-game-name
          version: run-${{ github.run_id }}
          files: |
            builds/html.zip:html5
            builds/windows.zip:windows
