name: Build Game
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0 # Ensure this matches your Godot version
          include-templates: true

      - name: Build Projects
        run: |
          mkdir -p builds/windows
          mkdir -p builds/html
          godot --headless --export-release "Windows Desktop" builds/windows/index.exe
          godot --headless --export-release "Web" builds/html/index.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-builds
          path: builds/
